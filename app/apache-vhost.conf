<VirtualHost *:5501
>
    ServerAdmin admin@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>

    Errorlog ${APACHE_LOG_DIR}/error.1og
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
